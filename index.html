<!DOCTYPE html>
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Q55XdGfgCRa8f_CpTHVnWHHRnz0POVzW-UhfwbEUPR0" />
  <title>青看板検索ツール</title>
  <meta name="description" content="日本全国の青看板を地名や道路種別（国道・県道）、形状、地図から検索できるツールです。">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="canonical" href="https://sesso-richu.github.io/bgssearcher/">
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .main-content{
      padding: 15px;
      flex: 1;
    }
    h2 {
      color: #2c3e50;
      margin: 0 0 15px 0;
      font-size: 18px;
      text-align: center;
    }
    .search-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }    
    input[type="text"] {
      flex: 1;
      max-width: 400px;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box; 
    }    
    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }
    .filter-select-wrapper {
      display: flex;
      gap: 10px;
    }
    .filter-select-wrapper select {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background-color: #fff;
      box-sizing: border-box;
      color: #333;
      cursor: pointer;
    }
    .filter-select-wrapper select:focus {
      border-color:#3498db;
      outline: none;
    }
    .content-wrapper {
      display: flex;
      flex-direction: row;
      gap: 15px;
      width: 100%;
      height: 600px;
      max-height: 600px;
      margin-bottom: 15px;
    }   
    .list-container {
      width: 50%;
      min-width: 50%;
      max-width: 50%;
      height: 600px;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 5px;
      box-sizing: border-box;
    }
    .data-card { display: flex;  background: white; border-radius: 8px; overflow: hidden; box-shadow: none; border: 1px solid #eef2f5; cursor: pointer; height: auto; box-sizing: border-box; flex-shrink: 0; }   
    .card-img { width: 100px; height: 100px; object-fit: cover; background: #eaeded; flex-shrink: 0; }   
    .card-info { padding: 10px; display: flex; flex-direction: column; justify-content: center; gap: 4px; flex-grow: 1; overflow: hidden; }
    .data-card.active .card-info { justify-content: flex-start; }
    .card-name { font-size: 14px; font-weight: bold; color: #2c3e50; margin: 0; }
    .card-address { font-size: 12px; color: #7f8c8d; margin: 0; }   
    .card-detail { font-size: 12px; color: #34495e; margin: 4px 0 0 0; padding-top: 4px; border-top: 1px dashed #ddd; display: none; padding-right: 5px; word-break: break-all; }
    .data-card.active .card-detail { display: block; }    
    .search-container { text-align: left; }
   
    #map {
      flex: 1;
      height: 600px;
      border-radius: 8px;
      border: 1px solid #eef2f5;
    }
   
    .no-data { text-align: center; padding: 40px; background: white; border-radius: 8px; color: #7f8c8d; font-size: 14px; width: 100%; box-sizing: border-box; }
    #imageViewer { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    #imageViewer.show { display: flex; }
    #viewerImage { max-width: 90%; max-height: 90%; border-radius: 4px; }

    .data-card.highlight { background: #fff6e4; border: 1px solid #ffe1b3; }

    #advancedSearchBtn {
      background: #ecf0f1; border: 2px solid #bdc3c7; color: #2c3e50;
      border-radius: 8px; padding: 6px 15px; cursor: pointer; white-space: nowrap;
      transition: background 0.2s;
    }
    #advancedSearchBtn:hover { background: #dfe6e9; }

    .modal-overlay {
      display: none; position: fixed; z-index: 9999; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.6);
      align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: #fff; width: 90%; max-width: 600px;
      height: 90vh;
      border-radius: 12px; display: flex; flex-direction: column;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2); overflow: hidden;
    }
    .modal-header {
      padding: 15px 20px; border-bottom: 1px solid #ddd;
      display: flex; justify-content: space-between; align-items: center;
      background: #eef2f5; flex-shrink: 0;
    }
    .modal-close { font-size: 28px; cursor: pointer; color: #7f8c8d; line-height: 1; }
    
    /* 中身だけがスクロールする設定 */
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #34495e; }
    .form-row-2col { display: flex; gap: 15px; }
    .form-row-2col .form-group { flex: 1; }
    .modal-body input[type="text"], .modal-body select {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 15px; background-color: #ffffff;
    }

    /* チェックボックス */
    .feature-section-title { font-size: 13px; color: #7f8c8d; margin: 10px 0 5px 0; }
    .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-bottom: 10px; }
    .feature-card { cursor: pointer; display: block; position: relative; }
    .feature-card input[type="checkbox"] { position: absolute; top: 0; left: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; z-index: 10; margin: 0; }
    .card-content {
      border: 2px solid #ddd; border-radius: 8px; padding: 10px 5px; text-align: center;
      transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; box-sizing: border-box; background: #ffffff;
    }
    .card-content img { width: 100%; max-height: 50px; object-fit: contain; margin-bottom: 5px; }
    .card-content span { font-size: 12px; font-weight: bold; color: #2c3e50; }
    /* チェックされた時の見た目 */
    .feature-card input[type="checkbox"]:checked + .card-content {
      border-color: #3498db; background: #ebf5fb; color: #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
    }
    .card-content.is-active {
      border-color: #3498db; background: #ebf5fb; color: #3498db; box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
    }
    .modal-footer {
      padding: 15px 20px; border-top: 1px solid #ddd; background: #fff; flex-shrink: 0; text-align: right;
    }
    .clear-btn {
      background: #bdc3c7; color: #2c3e50; border: none; padding: 12px 20px; font-size: 16px; font-weight: bold;
      border-radius: 8px; cursor: pointer; flex: 1; transition: background 0.2s;
    }
    .clear-btn:hover { background: #b2bec3; }
    .apply-btn {
      background: #3498db; color: white; border: none; padding: 12px 30px; font-size: 16px; font-weight: bold;
      border-radius: 8px; cursor: pointer; flex: 2; transition: background 0.2s;
    }
    .apply-btn:hover { background: #2980b9; }

    @media screen and (max-width: 768px) {
      body { height: 100dvh; min-height: 0; overflow: hidden margin: 0; padding: 0 display: flex; flex-direction: column; }
      body .custom-header { display: block; height: auto; min-height: 0; padding: 8px 10px 4px 10px; margin: 0; text-align: left; position: relative; }
      body .custom-header .header-title { font-size: 15px; margin: 0; padding: 0; line-height: 1.2; }
      body .custom-header .header-desc { font-size: 10px; margin: 2px 0 0 0; padding: 0; line-height: 1.3; opacity: 0.85; max-width: 55%; white-space: normal; }
      body .nav-bar { position: absolute; top: 6px; right: 8px; background: transparent; padding: 0; display: flex; justify-content: flex-start; gap: 5px; }
      body .nav-bar a { margin: 0; font-size: 11px; background: rgba(44, 62, 80, 0.85); padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(255, 255, 255, 0.3); }
      body .main-content { padding: 0;  margin: 0; display: flex; flex-direction: column; flex: 1; min-height: 0; }
      body .search-container { flex-direction: column; align-items: stretch; gap: 4px; margin: 6px 6px 4px 6px; padding: 0; }
      body .search-container input[type="text"] { max-width: 100%; padding: 6px 8px; font-size: 13px; height: auto; }
      body .filter-select-wrapper { width: 100% gap: 4px; }
      body .filter-select-wrapper select { flex: 1; width: 50%; padding: 6px 4px; font-size: 12px; height: auto; }
      body .content-wrapper { display: flex; flex-direction: column-reverse; flex: 1; min-height: 0; gap: 4px; margin: 0 6px 6px 6px; width: auto; height: auto; max-height: none; }    
      body #map { width: 100%; height: 35dvh; flex: none; margin: 0; }    
      body .list-container { width: 100%; min-width: 100%; max-width: 100%; height: auto; max-height: none; flex: 1; min-height: 0;  padding: 0; overflow-y: auto; }
      body .custom-footer { display: none; }
      body .search-container { flex-direction: column; align-items: stretch; gap: 8px; }
      #advancedSearchBtn { width: 100%; }
      .modal-content { width: 95%; height: 85vh; }
      .checkbox-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .custom-header {
      background-image: url('https://i.ibb.co/zh21tn7g/IMG-2912.jpg');
      background-size: cover;
      background-position: center;
      position: relative;

    }
    .header-content {
      position: relative;
      z-index: 1;
    }
    .header-title {
      font-size: 32px;
      font-weight: bold;

      letter-spacing: 2px;
    }
    .header-desc {
      font-size: 16px;

      opacity: 0.9;

    .nav-bar {

    .nav-bar a {
      color: white;

      transition: opacity 0.2s;

    .nav-bar a:hover {
      opacity: 0.7;

    .custom-footer {

  </style>

<body>
  <header class="custom-header">
    <div class="header-content">
      <h1 class="header-title">青看板検索ツール</h1>
      <p class="header-desc">道路案内標識（青看板）の地名を入力するとその地名を含む青看板がヒットします</p>
    </div>
  </header>

  <nav class="nav-bar">
    <a href="./">マップ検索</a>
    <a href="updates.html">更新情報</a>
    <a href="about.html">about</a>
  </nav>

  <div class="main-content">

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="地名を入力…(ｶﾝﾏ,ｽﾍﾟｰｽ区切り可)" oninput="filterData()">
    <button id="advancedSearchBtn" onclick="openAdvancedSearch()">
      <span style="font-size: 15px; font-weight: bold;">詳細検索</span><br><span style="font-size: 11px;">(β版)</span>
    </button>
  </div>

  <div class="content-wrapper">
    <div class="list-container" id="listContainer">
      <div class="no-data">読み込み中…</div>
    </div>
    <div id="map"></div>
  </div>

  <footer class="custom-footer">
    <small>created by セッソー</small>
  </footer>

  <div id="imageViewer" onclick="closeViewer()">
    <img id="viewerImage" src="" alt="拡大画像">
  </div>

  <div id="advancedSearchModal" class="modal-overlay" onclick="closeAdvancedSearch(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 style="margin:0; font-size:20px; color:#2c3e50;">詳細検索（β版）</h2>
        <span class="modal-close" onclick="closeAdvancedSearch()">×</span>
      </div>
      
      <div class="modal-body">
        
        <div class="form-row-2col">
          <div class="form-group">
            <label>都道府県</label>
            <select id="advPrefecture">
              <option value="">すべて</option>
              <option value="埼玉県">埼玉県</option><option value="千葉県">千葉県</option><option value="東京都">東京都</option><option value="神奈川県">神奈川県</option>
              <option value="石川県">石川県</option><option value="岐阜県">岐阜県</option><option value="静岡県">静岡県</option>
              <option value="京都府">京都府</option>
            </select>
          </div>
          <div class="form-group">
            <label>道路種別</label>
            <select id="advRoadType">
              <option value="">すべて</option>
              <option value="国道">国道</option>
              <option value="県道">県道</option>
              <option value="市道">市道</option>
              <option value="その他">その他</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>交差路線</label>
          <input type="text" id="advCrossRoad" placeholder="例: 国道1号">
        </div>
        
        <div class="form-group">
          <label>高速道路案内</label>
          <input type="text" id="advHighway" placeholder="ﾅﾝﾊﾞﾘﾝｸﾞか道路名を入力（例: E1,東名高速）">
        </div>

        <div class="form-group">
          <label style="margin-bottom: 5px;">特徴</label>
          
          <div class="feature-section-title">《形状》</div>
          <div class="checkbox-grid">
            <div class="feature-card"><input type="checkbox" name="advFeature" value="分割"><div class="card-content"><img src="shape1.jpg" alt="画像" onerror="this.style.display='none'"><span>分割</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="シンボル"><div class="card-content"><img src="shape2.jpg" alt="画像" onerror="this.style.display='none'"><span>シンボル</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="電光"><div class="card-content"><img src="shape3.jpg" alt="画像" onerror="this.style.display='none'"><span>電光</span></div></div>
          </div>

          <div class="feature-section-title">《概形》</div>
          <div class="checkbox-grid">
            <div class="feature-card"><input type="checkbox" name="advFeature" value="交差なし"><div class="card-content"><img src="crossimg_1.png" alt="画像" onerror="this.style.display='none'"><span>交差なし</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="2交差"><div class="card-content"><img src="crossimg_2.png" alt="画像" onerror="this.style.display='none'"><span>2交差</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="3交差以上"><div class="card-content"><img src="crossimg_3.png" alt="画像" onerror="this.style.display='none'"><span>3交差以上</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="行止まり"><div class="card-content"><img src="crossimg_stp.png" alt="画像" onerror="this.style.display='none'"><span>行止まり</span></div></div>
            <div class="feature-card"><input type="checkbox" name="advFeature" value="矢印なし"><div class="card-content"><img src="crossimg_x.png" alt="画像" onerror="this.style.display='none'"><span>矢印なし</span></div></div>
          </div>
        </div>

      </div>
      
      <div class="modal-footer">
        <button class="apply-btn" onclick="applyAdvancedSearch()">適用</button>
        <button class="clear-btn" onclick="clearAdvancedSearch()">条件をクリア</button>
      </div>
    </div>
  </div>

  <script>
    let allData = [];
    let map;
    let markerGroup;

    function initMap() {
      map = L.map('map', { zooming: true, touchZoom: true }).setView([35.6812, 139.7671], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      markerGroup = L.layerGroup().addTo(map);
    }

    window.google = { 
      visualization: { 
        Query: { 
          setResponse: function(obj) { 
            window.handleGoogleResponse(obj); 
          } 
        } 
      } 
    };

    window.onload = function() {
      initMap();
      window.handleGoogleResponse = function(obj) {
        try {
          if (obj.status === 'error') {
            throw new Error('スプレッドシートのアクセス権限エラー: ' + (obj.errors[0].message || ''));
          }
          if (!obj || !obj.table) throw new Error('データ空');
          
          const table = obj.table;
          let headers = [];
          let dataRows = [];
          
          // 見出しを取り出す
          if (table.cols && table.cols.some(c => c.label)) {
            headers = table.cols.map(c => c.label ? String(c.label).trim() : '');
            dataRows = table.rows; // データはそのまま使用
          } else {
            // 予備ルート
            headers = table.rows[0].c.map(cell => cell ? (cell.v !== null ? String(cell.v).trim() : '') : '');
            dataRows = table.rows.slice(1);
          }

          const formattedData = dataRows.map(row => {
            if (!row || !row.c) return null;
            const item = {};
            row.c.forEach((cell, index) => {
              const header = headers[index];
              if (header) {
                item[header] = cell ? (cell.v !== null ? String(cell.v) : '') : '';
              }
            });

            if (item['座標']) {
              const coords = String(item['座標']).split(/[、,，\s]+/);
              if (coords.length >= 2) {
                item['緯度'] = parseFloat(coords[0]);
                item['経度'] = parseFloat(coords[1]);
              }
            }
            item['名称'] = item['道路名'] || item['地名'] || '無名のスポット';
            return item;
          }).filter(item => item !== null && !isNaN(item['緯度']) && !isNaN(item['経度']));

          if (formattedData.length === 0) {
            document.getElementById('listContainer').innerHTML = '<div class="no-data">データは取得できましたが、表示できるデータが0件です（「座標」という列名が存在しない可能性があります）</div>';
            return;
          }

          allData = formattedData;
          renderData(allData);
        } catch (err) {
          document.getElementById('listContainer').innerHTML = '<div class="no-data" style="color:red; font-weight:bold;">エラー: ' + err.message + '</div>';
        }
      };

      const sheetId = '11TIskUDnOrnWfnyXt9-IrFuSRRQHhpLTxjcQ1U6GXes';
      const script = document.createElement('script');
      script.src = 'https://docs.google.com/spreadsheets/d/' + sheetId + '/gviz/tq?tqx=out:json&sheet=シート1';
      document.body.appendChild(script);
    };
  
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
     clearTimeout(searchTimeout);
     searchTimeout = setTimeout(() => {
       filterData(this.value);
     }, 300);
    });

    function filterData() {
      const keyword = (document.getElementById('searchInput')?.value || '');
      const searchWords = keyword.trim() ? keyword.toLowerCase().split(/[\s,、]+/) : [];

      // 詳細検索の各値を取得
      const prefecture = document.getElementById('advPrefecture')?.value || '';
      const roadType = document.getElementById('advRoadType')?.value || '';
      const crossRoad = (document.getElementById('advCrossRoad')?.value || '').toLowerCase();
      const highway = (document.getElementById('advHighway')?.value || '').toLowerCase();
      
      // チェックされた特徴（複数）を取得
      const featureCheckboxes = document.querySelectorAll('input[name="advFeature"]:checked');
      const selectedFeatures = Array.from(featureCheckboxes).map(cb => cb.value);

      const filtered = allData.filter(function(row) {
        if (!row) return false;
        const desc = (row['地名'] || '').toString().toLowerCase();
        const matchKeyword = searchWords.length === 0 || searchWords.every(word => desc.indexOf(word) !== -1);
        const matchPrefecture = !prefecture || (row['都道府県'] || '') === prefecture;
        const matchRoadType = !roadType || (row['道路種別'] || '') === roadType;
        const matchCrossRoad = !crossRoad || (row['交差路線'] || '').toString().toLowerCase().indexOf(crossRoad) !== -1;
        const matchHighway = !highway || (row['高速'] || '').toString().toLowerCase().indexOf(highway) !== -1;
        const rowFeature = (row['特徴'] || '').toString();
        const matchFeature = selectedFeatures.length === 0 || selectedFeatures.every(feat => rowFeature.indexOf(feat) !== -1);
        return matchKeyword && matchPrefecture && matchRoadType && matchCrossRoad && matchHighway && matchFeature;
      });
      renderData(filtered);
    }

    function renderData(data) {
      const listContainer = document.getElementById('listContainer');
      listContainer.innerHTML = '';
      markerGroup.clearLayers();
      
      if (!data || data.length === 0) {
        listContainer.innerHTML = '<div class="no-data">該当するデータがありません</div>';
        return;
      }

      const bounds = [];

      data.forEach(function(row) {
        if (!row || !row['座標']) return;

        const imgUrl = row['画像'] ? row['画像'].toString() : 'https://placehold.co/120x120?text=No+Image';

        const card = document.createElement('div');
        card.className = 'data-card';
       
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = imgUrl;
        img.onerror = function() { this.src = 'https://placehold.co/120x120?text=Error'; };
        img.onclick = function(e) { openViewer(imgUrl); e.stopPropagation(); };
        card.appendChild(img);
       
        const info = document.createElement('div');
        info.className = 'card-info';
       
        const h3 = document.createElement('h3');
        h3.className = 'card-name';
        h3.innerText = row['道路名'] || '名称未設定';
        info.appendChild(h3);
       
        const p = document.createElement('p');
        p.className = 'card-address';
        p.innerText = row['住所'] || '住所未設定';
        info.appendChild(p);
       
        card.appendChild(info);

        let displayDate = row['撮影日'] || '-';
        if (displayDate.indexOf('Date(') !== -1) {
          const matches = displayDate.match(/Date\((\d+),(\d+),(\d+)/);
          if (matches) {
            const y = matches[1];
            const m = String(Number(matches[2]) + 1).padStart(2, '0');
            const d = matches[3].padStart(2, '0');
            displayDate = y + '年' + m + '月' + d + '日';
          }
        } else {
          displayDate = displayDate.split('T')[0]; // 予備
        }

        const detailDiv = document.createElement('div');
        detailDiv.className = 'card-detail';
        detailDiv.innerHTML = '<b>座標:</b> ' + (row['座標'] || '-') + '<br>' + '<b>地名:</b> ' + (row['地名'] || '-') + '<br>' + '<b>撮影日:</b> ' + displayDate;
        info.appendChild(detailDiv);

        card.addEventListener('click', function() {
          document.querySelectorAll('.data-card.active').forEach(c => { if (c !== card) c.classList.remove('active'); });
          document.querySelectorAll('.data-card.highlight').forEach(c => { if (c !== card) c.classList.remove('highlight'); });
          document.querySelectorAll('.custom-square-marker').forEach(m => m.classList.remove('selected'));
          markerGroup.eachLayer(function(layer){
            if (layer.setZIndexOffset) layer.setZIndexOffset(0);
          });
          const isActive = card.classList.toggle('active');
          if (isActive) {
            card.classList.add('highlight');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (card.associatedMarker && card.associatedMarker.getElement()){
              card.associatedMarker.getElement().classList.add('selected');
              card.associatedMarker.setZIndexOffset(1000);
            }
          } else {
            card.classList.remove('highlight');
            if (card.associatedMarker){
              card.associatedMarker.setZIndexOffset(0);
            }
          }
          
          if (row['座標']) {
            const parts = row['座標'].toString().split(',');
            if (parts.length === 2) {
              const lat = Number(parts[0]);
              const lng = Number(parts[1]);
              if (!isNaN(lat) && !isNaN(lng)) {
                map.setView([lat, lng], 16);
              }
            }
          }
        });

        listContainer.appendChild(card);

        if (row['座標']) {
          const parts = row['座標'].toString().split(',');
          if (parts.length === 2) {
            const lat = Number(parts[0]);
            const lng = Number(parts[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
              const squareIcon = L.divIcon({
                className: 'custom-square-marker',
                iconSize: [12, 12],                // [横幅, 縦幅]（ピクセル）
                iconAnchor: [6, 6]                 // 中心点を座標に合わせる
              });
              const marker = L.marker([lat, lng], { icon: squareIcon });
              card.associatedMarker = marker;
              markerGroup.addLayer(marker);
              marker.on('click', function() {
                document.querySelectorAll('.data-card.active').forEach(c => { if (c !== card) c.classList.remove('active'); });
                document.querySelectorAll('.data-card.highlight').forEach(c => c.classList.remove('highlight'));
                card.classList.add('highlight');
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                document.querySelectorAll('.custom-square-marker').forEach(m => m.classList.remove('selected'));
                const iconElement = marker.getElement();
                if (iconElement) {
                  iconElement.classList.add('selected');
                }
              });
              bounds.push([lat, lng]);
            }
          }
        }
      });

      if (bounds.length > 0 && map) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }
    function openViewer(src) {
      if (src.indexOf('placehold.co') !== -1) return;
      const viewer = document.getElementById('imageViewer');
      const img = document.getElementById('viewerImage');
      img.src = src;
      viewer.classList.add('show');
    }
    function closeViewer() {
      document.getElementById('imageViewer').classList.remove('show');
    }
    function syncCheckboxStyles() {
      const checkboxes = document.querySelectorAll('input[name="advFeature"]');
      checkboxes.forEach(function(cb) {
        const cardContent = cb.nextElementSibling;
        if (cardContent) {
          if (cb.checked) {
            cardContent.classList.add('is-active');
          } else {
            cardContent.classList.remove('is-active');
          }
        }
      });
    }
    // モーダルの制御
    function openAdvancedSearch() {
      document.getElementById('advancedSearchModal').classList.add('show');
      syncCheckboxStyles();
    }
    function closeAdvancedSearch(e) {
      // 背景クリックで閉じる処理
      if (e && e.target !== document.getElementById('advancedSearchModal') && !e.target.classList.contains('modal-close')) return;
      document.getElementById('advancedSearchModal').classList.remove('show');
    }
    function clearAdvancedSearch() {
      if (document.getElementById('advPrefecture')) document.getElementById('advPrefecture').value = '';
      if (document.getElementById('advRoadType')) document.getElementById('advRoadType').value = '';
      if (document.getElementById('advCrossRoad')) document.getElementById('advCrossRoad').value = '';
      if (document.getElementById('advHighway')) document.getElementById('advHighway').value = '';
      const checkboxes = document.querySelectorAll('input[name="advFeature"]');
      checkboxes.forEach(function(cb) {
        cb.checked = false;
      });
      syncCheckboxStyles();
      filterData();
    }
    function applyAdvancedSearch() {
      closeAdvancedSearch();
      filterData(); // 適用ボタンを押したらフィルタリングを実行
    }
    document.addEventListener('change', function(e) {
      if (e.target && e.target.name === 'advFeature') {
        syncCheckboxStyles();
      }
    });
  </script>
</body>
</html>
