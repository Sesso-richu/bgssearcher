<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="Q55XdGfgCRa8f_CpTHVnWHHRnz0POVzW-UhfwbEUPR0" />
  <title>青看板検索ツール</title>
  <meta name="description" content="日本全国の青看板を地名や道路種別（国道・県道）、形状、地図から検索できるツールです。">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .main-content{
      padding: 15px;
      flex: 1;
    }
    h2 { color: #2c3e50; margin: 0 0 15px 0; font-size: 18px; text-align: center; }
    .search-container {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }    
    input[type="text"] {
      flex: 1;
      max-width: 400px;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box; 
    }    
    input[type="text"]:focus {
      border-color: #3498db;
      outline: none;
    }
    .filter-select-wrapper {
      display: flex;
      gap: 10px;
    }
    .filter-select-wrapper select {
      padding: 12px;
      font-size: 16px;
      border: 2px solid #ddd;
      border-radius: 8px;
      background-color: #fff;
      box-sizing: border-box;
      color: #333;
      cursor: pointer;
    }
    .filter-select-wrapper select:focus {
      border-color:#3498db;
      outline: none;
    }
    .content-wrapper {
      display: flex;
      flex-direction: row;
      gap: 15px;
      width: 100%;
      height: 600px;
      max-height: 600px;
      margin-bottom: 15px;
    }   
    .list-container {
      width: 50%;
      height: 600px;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 5px;
      box-sizing: border-box;
    }
    .data-card {
      display: flex;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: none;
      border: 1px solid #eef2f5;
      cursor: pointer;
      min-height: 100px;
      box-sizing: border-box;
    }   
    .card-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      background: #eaeded;
      flex-shrink: 0;
    }   
    .card-info { padding: 10px; display: flex; flex-direction: column; justify-content: center; gap: 4px; flex-grow: 1; overflow: hidden; }
    .card-name { font-size: 14px; font-weight: bold; color: #2c3e50; margin: 0; }
    .card-address { font-size: 12px; color: #7f8c8d; margin: 0; }   
    .card-detail { font-size: 12px; color: #34495e; margin: 4px 0 0 0; padding-top: 4px; border-top: 1px dashed #ddd; display: none; }
    .data-card.active .card-detail { display: block; } /* クリックされたら表示する */
    .search-container { text-align: left; }
    .card-detail { max-height: none; overflow: visible; padding-right: 5px; }
   
    #map {
      flex: 1;
      height: 600px;
      border-radius: 8px;
      border: 1px solid #eef2f5;
    }
   
    .no-data { text-align: center; padding: 40px; background: white; border-radius: 8px; color: #7f8c8d; font-size: 14px; width: 100%; box-sizing: border-box; }
    #imageViewer { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    #imageViewer.show { display: flex; }
    #viewerImage { max-width: 90%; max-height: 90%; border-radius: 4px; }

    .data-card.highlight { background: #fff6e4; border: 1px solid #ffe1b3; }

    @media screen and (max-width: 768px) {
      .content-wrapper {
        flex-direction: column;
        height: auto; 
        max-height: none;
      }    
      #map {
        order: -1;
        width: 100%;
        height: 40vh !important;
        flex: none;
        margin-bottom: 10px;
      }    
      .list-container {
        order: 1;
        width: 100%;
        height: 50vh !important;
        max-height: none !important;
        flex: none;
        padding-right: 0;
      }
      .search-container {
        flex-direction: column;
        align-items: stretch;
        padding: 0 15px;
      }
      input[type="text"] {
        max-width: 100%;
      }
      .filter-select-wrapper {
        width: 100%;
      }
      .filter-select-wrapper select {
        flex: 1;
        width: 50%;
      }
    }
    .custom-header {
      background-image: url('https://i.ibb.co/zh21tn7g/IMG-2912.jpg');
      background-size: cover;
      background-position: center;
      position: relative;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }
    .custom-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.55);
    }
    .header-content {
      position: relative;
      z-index: 1;
    }
    .header-title {
      font-size: 32px;
      font-weight: bold;
      margin: 0 0 10px 0;
      letter-spacing: 2px;
    }
    .header-desc {
      font-size: 16px;
      font-weight: 300;
      margin: 0;
      opacity: 0.9;
    }
    .nav-bar {
      background: #2c3e50;
      display: flex;
      justify-content: center;
      padding: 12px 0;
    }
    .nav-bar a {
      color: white;
      text-decoration: none;
      margin: 0 20px;
      font-size: 15px;
      transition: opacity 0.2s;
    }
    .nav-bar a:hover {
      opacity: 0.7;
    }
    .custom-footer {
      background: #2c3e50;
      color: #bdc3c7;
      text-align: center;
      padding: 20px;
      font-size: 13px;
    }
    .custom-square-marker {
      background-color: #3250a8;
      border: 1px solid #ffffff;
      border-radius: 0;
      box-sizing: border-box;
    }
    .custom-square-marker.selected {
      background-color: #ff850a !important;
      z-index: 1000 !important;
    }
  </style>
</head>
<body>
  <header class="custom-header">
    <div class="header-content">
      <h1 class="header-title">青看板検索ツール</h1>
      <p class="header-desc">道路案内標識（青看板）の地名を入力するとその地名を含む青看板がヒットします</p>
    </div>
  </header>

  <nav class="nav-bar">
    <a href="index.html">マップ検索</a>
    <a href="updates.html">更新情報</a>
  </nav>

  <div class="main-content">

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="地名を入力…(ｶﾝﾏ,ｽﾍﾟｰｽ区切り可)" oninput="filterData()">
    <div class="filter-select-wrapper">
      <select id="roadTypeFilter" onchange="filterData()">
        <option value="">全ての道路種別</option>
        <option value="国道">国道</option>
        <option value="県道">県道</option>
        <option value="市道">市道</option>
        <option value="その他">その他</option>
      </select>
     
      <select id="shapeFilter" onchange="filterData()">
        <option value="">全ての形状</option>
        <option value="分割">分割</option>
        <option value="シンボル">シンボル</option>
        <option value="電光">電光</option>
      </select>
    </div>
  </div>

  <div class="content-wrapper">
    <div class="list-container" id="listContainer">
      <div class="no-data">読み込み中…</div>
    </div>
    <div id="map"></div>
  </div>

  <footer class="custom-footer">
    <small>created by セッソー</small>
  </footer>

  <div id="imageViewer" onclick="closeViewer()">
    <img id="viewerImage" src="" alt="拡大画像">
  </div>

  <script>
    let allData = [];
    let map;
    let markerGroup;

    function initMap() {
      map = L.map('map', { zooming: true, touchZoom: true }).setView([35.6812, 139.7671], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      markerGroup = L.layerGroup().addTo(map);
    }

    window.google = { 
      visualization: { 
        Query: { 
          setResponse: function(obj) { 
            window.handleGoogleResponse(obj); 
          } 
        } 
      } 
    };

    window.onload = function() {
      initMap();
      window.handleGoogleResponse = function(obj) {
        try {
          if (obj.status === 'error') {
            throw new Error('スプレッドシートのアクセス権限エラー: ' + (obj.errors[0].message || ''));
          }
          if (!obj || !obj.table) throw new Error('データ空');
          
          const table = obj.table;
          let headers = [];
          let dataRows = [];
          
          // 見出しを取り出す
          if (table.cols && table.cols.some(c => c.label)) {
            headers = table.cols.map(c => c.label ? String(c.label).trim() : '');
            dataRows = table.rows; // データはそのまま使用
          } else {
            // 予備ルート
            headers = table.rows[0].c.map(cell => cell ? (cell.v !== null ? String(cell.v).trim() : '') : '');
            dataRows = table.rows.slice(1);
          }

          const formattedData = dataRows.map(row => {
            if (!row || !row.c) return null;
            const item = {};
            row.c.forEach((cell, index) => {
              const header = headers[index];
              if (header) {
                item[header] = cell ? (cell.v !== null ? String(cell.v) : '') : '';
              }
            });

            if (item['座標']) {
              const coords = String(item['座標']).split(/[、,，\s]+/);
              if (coords.length >= 2) {
                item['緯度'] = parseFloat(coords[0]);
                item['経度'] = parseFloat(coords[1]);
              }
            }
            item['名称'] = item['道路名'] || item['地名'] || '無名のスポット';
            return item;
          }).filter(item => item !== null && !isNaN(item['緯度']) && !isNaN(item['経度']));

          if (formattedData.length === 0) {
            document.getElementById('listContainer').innerHTML = '<div class="no-data">データは取得できましたが、表示できるデータが0件です（「座標」という列名が存在しない可能性があります）</div>';
            return;
          }

          allData = formattedData;
          renderData(allData);
        } catch (err) {
          document.getElementById('listContainer').innerHTML = '<div class="no-data" style="color:red; font-weight:bold;">エラー: ' + err.message + '</div>';
        }
      };

      const sheetId = '11TIskUDnOrnWfnyXt9-IrFuSRRQHhpLTxjcQ1U6GXes';
      const script = document.createElement('script');
      script.src = 'https://docs.google.com/spreadsheets/d/' + sheetId + '/gviz/tq?tqx=out:json&sheet=シート1';
      document.body.appendChild(script);
    };
  
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
     clearTimeout(searchTimeout);
     searchTimeout = setTimeout(() => {
       filterData(this.value);
     }, 300);
    });

    function filterData() {
      const keyword = (document.getElementById('searchInput')?.value || '');
      const selectedRoadType = document.getElementById('roadTypeFilter')?.value || '';
      const selectedShape = document.getElementById('shapeFilter')?.value || '';
      if (!keyword.trim() && !selectedRoadType && !selectedShape) {
        renderData(allData);
        return;
      }

      // キーワードの分割処理
      const searchWords = keyword.trim() ? keyword.toLowerCase().split(/[\s,、]+/) : [];

      // 全データから、3つの条件すべてをクリアした行だけを絞り込む
      const filtered = allData.filter(function(row) {
        if (!row) return false;

        // キーワード（道路名＋地名）のチェック
        const name = (row['道路名'] || '').toString();
        const desc = (row['地名'] || '').toString();
        const targetText = (name + " " + desc).toLowerCase();
        const matchKeyword = searchWords.every(function(word) { 
          return targetText.indexOf(word) !== -1; 
        });

        // 道路種別のチェック
        const roadType = (row['道路種別'] || '').toString();
        const matchRoadType = !selectedRoadType || roadType === selectedRoadType;

        // 形状のチェック
        const shape = (row['形状'] || '').toString();
        const matchShape = !selectedShape || shape === selectedShape;

        // A、B、C すべての条件が true のデータだけを残す
        return matchKeyword && matchRoadType && matchShape;
      });

      // 絞り込んだ結果を画面（地図とリスト）に描画する
      renderData(filtered);
    }

    function renderData(data) {
      const listContainer = document.getElementById('listContainer');
      listContainer.innerHTML = '';
      markerGroup.clearLayers();
      
      if (!data || data.length === 0) {
        listContainer.innerHTML = '<div class="no-data">該当するデータがありません</div>';
        return;
      }

      const bounds = [];

      data.forEach(function(row) {
        if (!row || !row['座標']) return;

        const imgUrl = row['画像'] ? row['画像'].toString() : 'https://placehold.co/120x120?text=No+Image';

        const card = document.createElement('div');
        card.className = 'data-card';
       
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = imgUrl;
        img.onerror = function() { this.src = 'https://placehold.co/120x120?text=Error'; };
        img.onclick = function(e) { openViewer(imgUrl); e.stopPropagation(); };
        card.appendChild(img);
       
        const info = document.createElement('div');
        info.className = 'card-info';
       
        const h3 = document.createElement('h3');
        h3.className = 'card-name';
        h3.innerText = row['道路名'] || '名称未設定';
        info.appendChild(h3);
       
        const p = document.createElement('p');
        p.className = 'card-address';
        p.innerText = row['住所'] || '住所未設定';
        info.appendChild(p);
       
        card.appendChild(info);

        let displayDate = row['撮影日'] || '-';
        if (displayDate.indexOf('Date(') !== -1) {
          const matches = displayDate.match(/Date\((\d+),(\d+),(\d+)/);
          if (matches) {
            const y = matches[1];
            const m = String(Number(matches[2]) + 1).padStart(2, '0');
            const d = matches[3].padStart(2, '0');
            displayDate = y + '年' + m + '月' + d + '日';
          }
        } else {
          displayDate = displayDate.split('T')[0]; // 予備
        }

        const detailDiv = document.createElement('div');
        detailDiv.className = 'card-detail';
        detailDiv.innerHTML = '<b>座標:</b> ' + (row['座標'] || '-') + '<br>' + '<b>地名:</b> ' + (row['地名'] || '-') + '<br>' + '<b>撮影日:</b> ' + displayDate;
        info.appendChild(detailDiv);

        card.addEventListener('click', function() {
          document.querySelectorAll('.data-card.active').forEach(c => { if (c !== card) c.classList.remove('active'); });
          document.querySelectorAll('.data-card.highlight').forEach(c => { if (c !== card) c.classList.remove('highlight'); });
          document.querySelectorAll('.custom-square-marker').forEach(m => m.classList.remove('selected'));
          markerGroup.eachLayer(function(layer){
            if (layer.setZIndexOffset) layer.setZIndexOffset(0);
          });
          const isActive = card.classList.toggle('active');
          if (isActive) {
            card.classList.add('highlight');
            card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            if (card.associatedMarker && card.associatedMarker.getElement()){
              card.associatedMarker.getElement().classList.add('selected');
              card.associatedMarker.setZIndexOffset(1000);
            }
          } else {
            card.classList.remove('highlight');
            if (card.associatedMarker){
              card.associatedMarker.setZIndexOffset(0);
            }
          }
          
          if (row['座標']) {
            const parts = row['座標'].toString().split(',');
            if (parts.length === 2) {
              const lat = Number(parts[0]);
              const lng = Number(parts[1]);
              if (!isNaN(lat) && !isNaN(lng)) {
                map.setView([lat, lng], 16);
              }
            }
          }
        });

        listContainer.appendChild(card);

        if (row['座標']) {
          const parts = row['座標'].toString().split(',');
          if (parts.length === 2) {
            const lat = Number(parts[0]);
            const lng = Number(parts[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
              const squareIcon = L.divIcon({
                className: 'custom-square-marker',
                iconSize: [12, 12],                // [横幅, 縦幅]（ピクセル）
                iconAnchor: [6, 6]                 // 中心点を座標に合わせる
              });
              const marker = L.marker([lat, lng], { icon: squareIcon });
              card.associatedMarker = marker;
              markerGroup.addLayer(marker);
              marker.on('click', function() {
                document.querySelectorAll('.data-card.active').forEach(c => { if (c !== card) c.classList.remove('active'); });
                document.querySelectorAll('.data-card.highlight').forEach(c => c.classList.remove('highlight'));
                card.classList.add('highlight');
                card.classList.add('active');
                card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                document.querySelectorAll('.custom-square-marker').forEach(m => m.classList.remove('selected'));
                const iconElement = marker.getElement();
                if (iconElement) {
                  iconElement.classList.add('selected');
                }
              });
              bounds.push([lat, lng]);
            }
          }
        }
      });

      if (bounds.length > 0 && map) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }

    function openViewer(src) {
      if (src.indexOf('placehold.co') !== -1) return;
      const viewer = document.getElementById('imageViewer');
      const img = document.getElementById('viewerImage');
      img.src = src;
      viewer.classList.add('show');
    }

    function closeViewer() {
      document.getElementById('imageViewer').classList.remove('show');
    }
  </script>
</body>
</html>
