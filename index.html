<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <title>Map Search Stable</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 15px;
      background: #ffffff;
      color: #333;
      overflow: hidden;
      height: 95vh;
    }
    h2 { color: #2c3e50; margin: 0 0 15px 0; font-size: 18px; text-align: center; }
    .search-container { margin-bottom: 15px; text-align: center; }
    input[type="text"] { width: 100%; max-width: 500px; padding: 12px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    input[type="text"]:focus { border-color: #3498db; outline: none; }
   
    .content-wrapper {
      display: flex;
      flex-direction: row;
      gap: 15px;
      width: 100%;
      height: 600px;
      max-height: 600px;
    }
   
    // 左側表
    .list-container {
      width: 50%;
      min-width: 50%;
      max-width: 50%;
      height: 600px;
      max-height: 600px;
      overflow-y: scroll;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-right: 5px;
      box-sizing: border-box;
    }
   
    // 表
    .data-card {
      display: flex;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: none;
      border: 1px solid #eef2f5;
      cursor: pointer;
      min-height: 100px;
      box-sizing: border-box;
    }
   
    .card-img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      background: #eaeded;
      flex-shrink: 0;
    }
   
    .card-info { padding: 10px; display: flex; flex-direction: column; justify-content: center; gap: 4px; flex-grow: 1; overflow: hidden; }
    .card-name { font-size: 14px; font-weight: bold; color: #2c3e50; margin: 0; }
    .card-address { font-size: 12px; color: #7f8c8d; margin: 0; }
   
    // 詳細用デザイン
    .card-detail { font-size: 12px; color: #34495e; margin: 4px 0 0 0; padding-top: 4px; border-top: 1px dashed #ddd; display: none; }
    .data-card.active .card-detail { display: block; } // クリックされたら表示する
    .search-container { text-align: left; }
    .card-detail { max-height: 120px; overflow-y: auto; padding-right: 5px; }
   
    // 右側地図
    #map {
      flex: 1;
      height: 600px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border: 1px solid #eef2f5;
    }
   
    .no-data { text-align: center; padding: 40px; background: white; border-radius: 8px; color: #7f8c8d; font-size: 14px; width: 100%; box-sizing: border-box; }
    #imageViewer { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); align-items: center; justify-content: center; }
    #imageViewer.show { display: flex; }
    #viewerImage { max-width: 90%; max-height: 90%; border-radius: 4px; }


    .data-card.highlight { background: #fff3c2 !important; border: 1px solid #ffeda3; }


// スマホ画面（幅768px以下）のレイアウト変更
    @media screen and (max-width: 768px) {
      .content-wrapper {
        flex-direction: column; // 縦並びに変更
        height: calc(95vh - 70px); // 検索窓の高さを引いた画面いっぱいに設定
        max-height: none;
      }
      
      #map {
        order: 1; // 地図を上に配置
        width: 100%;
        height: 40vh !important; // 地図の高さを画面の約4割に設定
        flex: none;
      }
      
      .list-container {
        order: 2; // リストを下に配置
        width: 100%;
        min-width: 100%;
        max-width: 100%;
        height: auto !important;
        max-height: none !important;
        flex: 1; // 残りの高さをすべてリスト領域にする
        padding-right: 0;
      }
    }
  </style>
</head>
<body>
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="地名を入力…">
  </div>

  <div class="content-wrapper">
    <div class="list-container" id="listContainer">
      <div class="no-data">読み込み中…</div>
    </div>
    <div id="map"></div>
  </div>

  <div id="imageViewer" onclick="closeViewer()">
    <img id="viewerImage" src="" alt="拡大画像">
  </div>

  <script>
    let allData = [];
    let map;
    let markerGroup;

    function initMap() {
      map = L.map('map', { zooming: true, touchZoom: true }).setView([35.6812, 139.7671], 10);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      markerGroup = L.layerGroup().addTo(map);
    }

    window.onload = function() {
      initMap();
      const spreadsheetId = '11TIskUDnOrnWfnyXt9-IrFuSRRQHhpLTxjcQ1U6GXes';
      const sheetName = 'シート1';
      const url = `https://docs.google.com/spreadsheets/d/${spreadsheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

      fetch(url)
        .then(response => response.text())
        .then(text => {
          const data = parseGoogleSheetResponse(text);
    
    // 💡【重要】データが届いた後に、地図にピンを打つ関数をここで呼び出します。
    // 元のコードで「.then(data => {」の直後に書かれていた関数名（例：renderMarkers(data); など）に書き換えてください。
          renderMarkers(data); 
        })
        .catch(error => {
          console.error('データの取得に失敗しました:', error);
          alert('スプレッドシートからデータを取得できませんでした');
        });
  
    };
       
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
     clearTimeout(searchTimeout);
     searchTimeout = setTimeout(() => {
       filterData(this.value);
     }, 300); // 300ミリ秒入力が止まったら検索を実行
    });

    // 住所検索の除外
    function filterData(keyword) {
      if (!keyword.trim()) {
        renderData(allData);
        return;
      }

      const searchWords = keyword.toLowerCase().split(/[\s,、]+/);

      const filtered = allData.filter(function(row) {
        if (!row) return false;
        const name = (row['道路名'] || '').toString();
        const desc = (row['地名'] || '').toString();
        const targetText = (name + " " + desc).toLowerCase();
       
        return searchWords.every(function(word) { return targetText.indexOf(word) !== -1; });
      });

      renderData(filtered);
    }

    // 表示処理
    function renderData(data) {
      const listContainer = document.getElementById('listContainer');
      listContainer.innerHTML = '';
      markerGroup.clearLayers();

      if (!data || data.length === 0) {
        listContainer.innerHTML = '<div class="no-data">該当するデータがありません</div>';
        return;
      }

      const bounds = [];

      data.forEach(function(row) {
        if (!row || !row['座標']) return;

        const imgUrl = row['画像'] ? row['画像'].toString() : 'https://placehold.co/120x120?text=No+Image';

        const card = document.createElement('div');
        card.className = 'data-card';
       
        const img = document.createElement('img');
        img.className = 'card-img';
        img.src = imgUrl;
        img.onerror = function() { this.src = 'https://placehold.co/120x120?text=Error'; };
        img.onclick = function(e) { openViewer(imgUrl); e.stopPropagation(); };
        card.appendChild(img);
       
        const info = document.createElement('div');
        info.className = 'card-info';
       
        const h3 = document.createElement('h3');
        h3.className = 'card-name';
        h3.innerText = row['道路名'] || '名称未設定';
        info.appendChild(h3);
       
        const p = document.createElement('p');
        p.className = 'card-address';
        p.innerText = row['住所'] || '住所未設定';
        info.appendChild(p);
       
        card.appendChild(info);

        // 詳細
        const detailDiv = document.createElement('div');
        detailDiv.className = 'card-detail';
        detailDiv.innerHTML = '<b>地名:</b> ' + (row['地名'] || '-') + '<br>' +
                              '<b>撮影日:</b> ' + (row['撮影日'] || '-').split('T')[0];
        info.appendChild(detailDiv);

        card.addEventListener('click', function() {
          // 他に開いているカードがあれば閉じる
          document.querySelectorAll('.data-card.active').forEach(c => {
            if (c !== card) c.classList.remove('active');
          });
         
          // このカードを開閉する
          card.classList.toggle('active');

          // 地図の移動処理
          const parts = row['座標'].toString().split(',');
          if (parts.length === 2) {
            const lat = Number(parts[0]);
            const lng = Number(parts[1]);
            if (!isNaN(lat) && !isNaN(lng)) {
              map.setView([lat, lng], 16);
            }
          }
        });

        listContainer.appendChild(card);

        const parts = row['座標'].toString().split(',');
        if (parts.length === 2) {
          const lat = Number(parts[0]);
          const lng = Number(parts[1]);
          if (!isNaN(lat) && !isNaN(lng)) {
            const marker = L.marker([lat, lng],{ shadowPane: '' });
            marker.options.shadowUrl = '';
            const noShadowIcon = L.icon({ iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png', shadowUrl: '' });
            noShadowIcon.options.iconSize = [25, 41];
            noShadowIcon.options.iconAnchor = [12, 41];
            marker.setIcon(noShadowIcon);
            markerGroup.addLayer(marker);
            marker.on('click', function() {
              document.querySelectorAll('.data-card.active').forEach(c => { if (c !== card) c.classList.remove('active'); });
              document.querySelectorAll('.data-card.highlight').forEach(c => c.classList.remove('highlight'));
              card.classList.add('highlight');
              card.classList.add('active');
              card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });
            bounds.push([lat, lng]);
          }
        }
      });

      if (bounds.length > 0 && map) {
        map.fitBounds(bounds, { padding: [30, 30] });
      }
    }

    function openViewer(src) {
      if (src.indexOf('placehold.co') !== -1) return;
      const viewer = document.getElementById('imageViewer');
      const img = document.getElementById('viewerImage');
      img.src = src;
      viewer.classList.add('show');
    }

    function closeViewer() {
      document.getElementById('imageViewer').classList.remove('show');
    }
    
    function parseGoogleSheetResponse(text) {
      const rawData = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);/);
      if (!rawData) return [];
  
      const obj = JSON.parse(rawData[1]);
      const table = obj.table;
  
      // 1行目の見出しを取得
      const headers = table.cols.map(col => col.label || '');
  
      // 2行目以降のデータをオブジェクトの配列に変換
      return table.rows.map(row => {
        const item = {};
        row.c.forEach((cell, index) => {
          const header = headers[index];
          if (header) { item[header] = cell ? (cell.v !== null ? cell.v : '') : '';
          }
        });
        return item;
      });
    }
  </script>
</body>
</html>
